name: Update LeetCode Badge

on:
  push:
    paths:
      - 'solutions/**'

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate badge
        run: python generate-badge.py

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leetcode-badge.svg
          git diff --cached --quiet || git commit -m "chore: update leetcode badge [skip ci]"
          git push
